version: '3.8'
services:
  neo4j:
    image: neo4j:5.18
    container_name: neo4j_graph_rag
    ports:
      - "7474:7474"  # Neo4j Browser
      - "7687:7687"  # Bolt protocol
    volumes:
      - ./neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/password123  # username/password
      - NEO4J_PLUGINS=["apoc"]        # enable the APOC plugin
